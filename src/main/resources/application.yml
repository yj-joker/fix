spring:
  application:
    name: weixiu
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  neo4j:
    uri: bolt://localhost:7687       # 协议是 bolt，不是 http
    authentication:
      username: neo4j
      password: mtdssq541yf              # 改成你设置的密码
    database: neo4j                    # 默认数据库
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/fix?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: mtdssq541yf
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
server:
  port: 8080
logging:
  level:
    org.neo4j.ogm: DEBUG              # 打印 OGM 生成的 Cypher
    org.springframework.data.neo4j: DEBUG
